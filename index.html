<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyro Bingo Hub</title>
    <style>
        :root {
            --spyro-purple: #a29bfe;
            --spyro-gold: #f1c40f;
            --spyro-deep-navy: #130f40;
            --bg-gradient: linear-gradient(180deg, #130f40 0%, #2c3e50 35%, #e67e22 75%, #a29bfe 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            overflow: hidden; /* Keeps the background static */
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 80vh; /* Limits height so it doesn't run off screen */
            perspective: 1000px;
            padding: 20px;
        }

        .menu-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: absolute;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            /* ADDED SCROLLING FOR TALL MENUS */
            max-height: 100%;
            overflow-y: auto; 
        }

        /* Custom Scrollbar for the glass cards */
        .menu-card::-webkit-scrollbar {
            width: 5px;
        }
        .menu-card::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .hidden {
            display: none;
            pointer-events: none;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: var(--spyro-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 15px 25px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-purple { background: var(--spyro-purple); color: var(--spyro-deep-navy); }
        .btn-gold { background: var(--spyro-gold); color: var(--spyro-deep-navy); }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            filter: brightness(1.1);
        }

        .back-btn {
            background: none;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="mainMenu" class="menu-card">
            <h1>Spyro Bingo</h1>
            <div class="btn-group">
                <button class="btn btn-purple" onclick="showMenu('soloMenu')">Solo Play</button>
                <button class="btn btn-gold" onclick="showMenu('multiMenu')">Multiplayer (Lockout)</button>
            </div>
        </div>

        <div id="soloMenu" class="menu-card hidden" style="opacity: 0; transform: translateX(100%);">
            <h1>Solo Modes</h1>
            <div class="btn-group">
                <a href="spyro1.html" class="btn btn-purple">Spyro 1 Bingo</a>
                <a href="spyro2.html" class="btn btn-purple">Spyro 2 Bingo</a>
                <a href="spyro3.html" class="btn btn-purple">Spyro 3 Bingo</a>
                <a href="solo.html" class="btn btn-purple">Trilogy Skillpoints Bingo</a>
                <button class="back-btn" onclick="showMenu('mainMenu')">← Back to Modes</button>
            </div>
        </div>

        <div id="multiMenu" class="menu-card hidden" style="opacity: 0; transform: translateX(100%);">
            <h1>Multiplayer</h1>
            <div class="btn-group">
                <a href="multiplayer1.html" class="btn btn-gold">Spyro 1 Lockout</a>
                <a href="multiplayer2.html" class="btn btn-gold">Spyro 2 Lockout</a>
                <a href="multiplayer3.html" class="btn btn-gold">Spyro 3 Lockout</a>
                <a href="multiplayer.html" class="btn btn-gold">Trilogy Skillpoints Lockout</a>
                <div style="opacity: 0.4; border: 1px dashed var(--glass-border); padding: 15px; border-radius: 15px; font-size: 0.8rem;">
                    More Multiplayer Modes coming soon...
                </div>
                <button class="back-btn" onclick="showMenu('mainMenu')">← Back to Modes</button>
            </div>
        </div>
    </div>

    <script>
        function showMenu(menuId) {
            const screens = ['mainMenu', 'soloMenu', 'multiMenu'];
            
            screens.forEach(id => {
                const el = document.getElementById(id);
                if (id === menuId) {
                    el.classList.remove('hidden');
                    setTimeout(() => {
                        el.style.opacity = "1";
                        el.style.transform = "translateX(0)";
                    }, 10);
                } else {
                    el.style.opacity = "0";
                    el.style.transform = "translateX(-100%)";
                    setTimeout(() => {
                        el.classList.add('hidden');
                    }, 500);
                }
            });
        }
    </script>
</body>
</html>
