<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spyro Bingo Hub</title>
    <style>
        :root {
            --spyro-purple: #a29bfe;
            --spyro-gold: #f1c40f;
            --spyro-deep-navy: #130f40;
            --bg-gradient: linear-gradient(180deg, #130f40 0%, #2c3e50 35%, #e67e22 75%, #a29bfe 100%);
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            overflow: hidden;
        }

        /* Subtle Sparkle Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .hub-container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid var(--glass-border);
            padding: 40px;
            border-radius: 30px;
            width: 90vw;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--spyro-gold);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 30px;
        }

        .menu-wrapper {
            position: relative;
            height: 320px; /* Fixed height to prevent jumpiness */
            overflow: hidden;
        }

        .menu-screen {
            position: absolute;
            width: 100%;
            transition: transform 0.5s ease, opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* View States */
        #mainMenu { opacity: 1; transform: translateX(0); }
        #soloMenu { opacity: 0; transform: translateX(100%); }
        #multiMenu { opacity: 0; transform: translateX(100%); }

        .hidden { display: none; }

        /* Buttons */
        .btn {
            display: block;
            padding: 18px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn:hover {
            background: var(--spyro-purple);
            color: var(--spyro-deep-navy);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-color: var(--spyro-purple);
        }

        .btn-gold {
            border-color: var(--spyro-gold);
            color: var(--spyro-gold);
        }

        .btn-gold:hover {
            background: var(--spyro-gold);
            color: var(--spyro-deep-navy);
        }

        .back-btn {
            background: transparent;
            border: none;
            color: white;
            opacity: 0.6;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.9rem;
            text-decoration: underline;
        }

        .back-btn:hover { opacity: 1; }

        .tagline {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="hub-container">
        <h1>Spyro Bingo</h1>
        
        <div class="menu-wrapper">
            <div id="mainMenu" class="menu-screen">
                <button class="btn" onclick="showMenu('soloMenu')">Solo Challenges</button>
                <button class="btn btn-gold" onclick="showMenu('multiMenu')">Multiplayer</button>
                <p class="tagline">SELECT YOUR MODE</p>
            </div>

            <div id="soloMenu" class="menu-screen hidden">
                <a href="solo.html" class="btn">Trilogy Skillpoints</a>
                <a href="spyro1.html" class="btn">Spyro 1</a>
                <a href="spyro2.html" class="btn">Spyro 2</a>
                <a href="spyro3.html" class="btn">Spyro 3</a>
                <button class="back-btn" onclick="showMenu('mainMenu')">← Back to Modes</button>
            </div>

            <div id="multiMenu" class="menu-screen hidden">
                <a href="multiplayer.html" class="btn btn-gold">Standard Lockout</a>
                <div style="opacity: 0.4; border: 1px dashed var(--glass-border); padding: 15px; border-radius: 15px; font-size: 0.8rem;">
                    More Multiplayer Modes coming soon...
                </div>
                <button class="back-btn" onclick="showMenu('mainMenu')">← Back to Modes</button>
            </div>
        </div>
    </div>

    <script>
        function showMenu(menuId) {
            const screens = ['mainMenu', 'soloMenu', 'multiMenu'];
            
            screens.forEach(id => {
                const el = document.getElementById(id);
                if (id === menuId) {
                    el.classList.remove('hidden');
                    // Small timeout to allow browser to register display:block before animating
                    setTimeout(() => {
                        el.style.opacity = "1";
                        el.style.transform = "translateX(0)";
                    }, 10);
                } else {
                    el.style.opacity = "0";
                    el.style.transform = "translateX(-100%)";
                    setTimeout(() => {
                        el.classList.add('hidden');
                    }, 500);
                }
            });
        }
    </script>
</body>
</html>
