<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spyro Multiplayer: Lockout Bingo</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root {
            --p1-color: #a29bfe; 
            --p2-color: #f1c40f; 
            --spyro-deep-navy: #130f40;
            --bg-gradient: linear-gradient(180deg, #130f40 0%, #2c3e50 35%, #e67e22 75%, #a29bfe 100%);
            --glass: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-white);
            overflow-x: hidden;
        }

        #captureWrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 650px;
            padding: 20px 10px;
            border-radius: 20px;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 10px 0;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.5);
            color: var(--p2-color);
        }

        #timerDisplay {
            font-family: 'Courier New', monospace;
            font-size: 2.4rem;
            font-weight: 900;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 40px;
            border-radius: 50px;
            border: 3px solid var(--p2-color);
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: var(--p2-color);
        }

        .bingo-card {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            width: 95vw;
            max-width: 580px;
            aspect-ratio: 1 / 1;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 3px solid var(--glass-border);
            border-radius: 18px;
            padding: 10px;
            gap: 6px;
        }

        .cell {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
            font-size: clamp(8px, 2.2vw, 11px);
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .cell.p1-marked {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7) !important;
            color: #130f40;
            border-color: #a29bfe;
        }

        .cell.p2-marked {
            background: linear-gradient(135deg, #f1c40f, #f39c12) !important;
            color: #130f40;
            border-color: #f1c40f;
        }

        .free-space {
            background: rgba(255,255,255,0.2) !important;
            border: 2px dashed var(--p2-color) !important;
        }

        .panel {
            background: rgba(19, 15, 64, 0.85);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            width: 95vw;
            max-width: 580px;
            border: 1px solid var(--p2-color);
            text-align: center;
            box-sizing: border-box;
        }

        input, textarea {
            background: #1e272e;
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin: 5px;
            width: calc(100% - 22px);
        }

        textarea { height: 120px; font-size: 12px; }

        button {
            background: var(--p2-color);
            color: var(--spyro-deep-navy);
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin: 5px;
            box-shadow: 0 3px 0 #b08d00;
        }

        button:active { transform: translateY(2px); box-shadow: 0 1px 0 #b08d00; }

        .hidden { display: none !important; }

        #winModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="captureWrapper">
        <h1>Lockout Bingo</h1>
        <div id="timerDisplay">00:00.00</div>
        <div class="bingo-card" id="bingo-grid"></div>
    </div>

    <div class="panel" id="lobbyPanel">
        <div id="setupView">
            <p>Your ID: <strong id="myIdDisplay" style="color:var(--p2-color)">...</strong></p>
            <input type="text" id="peerIdInput" placeholder="Enter Friend's ID">
            <button id="connectBtn">Connect to Friend</button>
            <button onclick="toggleSettings()" style="background:#6c5ce7; color:white; box-shadow:0 3px 0 #4834d4;">Edit Tasks</button>
            <p id="statusMsg" style="font-size:0.8rem; margin-top:10px; color:var(--p1-color)">Initializing PeerJS...</p>
        </div>

        <div id="settingsView" class="hidden">
            <h3 style="margin-top:0">Task Pool (Min 24)</h3>
            <textarea id="itemInput"></textarea>
            <button onclick="saveSettings()">Save & Close</button>
        </div>

        <div id="gameView" class="hidden">
            <span id="playerRole" style="font-weight:bold"></span>
            <br>
            <button onclick="location.reload()" style="background:#e74c3c; color:white; box-shadow:0 3px 0 #c0392b;">Reset Game</button>
        </div>
    </div>

    <div id="winModal" class="hidden">
        <div class="panel" style="max-width:400px">
            <h2 id="winnerTitle" style="color:var(--p2-color)">PLAYER 1 WINS!</h2>
            <p id="finalTime"></p>
            <button onclick="location.reload()">Play Again</button>
        </div>
    </div>

    <script>
        const defaultTasks = [
            "S1: Artisans Platform", "S1: Pink Tulip", "S1: Town Square Bulls", "S1: Scare 6 Gnorcs", "S1: Shemp Perfect", "S1: High Caves Painting", "S1: Metalhead Perfect", "S1: Jacques Perfect", "S1: Gnasty Perfect", "S1: Druid Platform", "S1: Terrace Village No Damage", "S1: Secret Room", "S1: Blue Wizard Hat", "S1: Hidden Stump",
            "S2: Idol Springs Idol", "S2: Hockey Perfect", "S2: Hurricos Windmills", "S2: Seaweed Clear", "S2: Under 1:10 Speedway", "S2: Crush Perfect", "S2: Gulp Perfect", "S2: Ripto Perfect", "S2: Catbat Quartet", "S2: All Cacti", "S2: Scorch Trees", "S2: 3 Laps Supercharge", "S2: Under 1:15 Speedway", "S2: Hit Ripto (Gulp)",
            "S3: Flame Trees", "S3: Tiki Heads", "S3: Funky Chicken", "S3: Glide Pedestal", "S3: Bomb Gophers", "S3: Beat Yeti", "S3: Agent 9 Powerup", "S3: Push Box", "S3: Hit Seahorses", "S3: Dino Secret", "S3: Skate Record I", "S3: Supercharge Wall", "S3: Skate Record II", "S3: Piranha Signs", "S3: Skate Record Time", "S3: Impossible Tower", "S3: Temple Windows", "S3: Dark Hole", "S3: Palm Trees"
        ];

        let currentTasks = [...defaultTasks];
        let peer, conn, myRole, isHost = false, startTime, timerInterval, isTimerRunning = false;

        document.getElementById('itemInput').value = currentTasks.join('\n');

        function initPeer() {
            peer = new Peer();
            peer.on('open', id => {
                document.getElementById('myIdDisplay').textContent = id;
                document.getElementById('statusMsg').textContent = "Ready. Share your ID or enter a friend's.";
            });

            peer.on('connection', c => {
                conn = c;
                isHost = true;
                myRole = 'p1';
                setupConn();
                const seed = Math.floor(Math.random() * 99999);
                generateBoard(seed);
                conn.on('open', () => {
                    conn.send({ type: 'init', seed: seed, tasks: currentTasks });
                });
                transitionToGame();
            });
        }

        function setupConn() {
            conn.on('data', data => {
                if (data.type === 'init') {
                    myRole = 'p2';
                    currentTasks = data.tasks;
                    generateBoard(data.seed);
                    transitionToGame();
                }
                if (data.type === 'mark') {
                    document.querySelector(`[data-idx="${data.idx}"]`).classList.add(data.role + '-marked');
                    checkLockout();
                }
                if (data.type === 'startTimer') startTimer(false);
            });
        }

        document.getElementById('connectBtn').onclick = () => {
            const peerId = document.getElementById('peerIdInput').value;
            if (!peerId) return alert("Enter an ID");
            conn = peer.connect(peerId);
            setupConn();
        };

        function toggleSettings() {
            document.getElementById('setupView').classList.toggle('hidden');
            document.getElementById('settingsView').classList.toggle('hidden');
        }

        function saveSettings() {
            const input = document.getElementById('itemInput').value.split('\n').filter(t => t.trim() !== "");
            if (input.length < 24) return alert("Need at least 24 tasks!");
            currentTasks = input;
            toggleSettings();
        }

        function transitionToGame() {
            document.getElementById('setupView').classList.add('hidden');
            document.getElementById('settingsView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
            document.getElementById('playerRole').textContent = isHost ? "HOST: PLAYER 1 (PURPLE)" : "GUEST: PLAYER 2 (GOLD)";
        }

        function generateBoard(seed) {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            const rng = mulberry32(seed);
            let shuffled = [...currentTasks].sort(() => 0.5 - rng()).slice(0, 24);
            shuffled.splice(12, 0, "START RUN");

            shuffled.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = (i === 12) ? 'cell free-space' : 'cell';
                div.textContent = text;
                div.dataset.idx = i;
                div.onclick = () => handleCellClick(i);
                grid.appendChild(div);
            });
        }

        function handleCellClick(idx) {
            const cell = document.querySelector(`[data-idx="${idx}"]`);
            if (cell.classList.contains('p1-marked') || cell.classList.contains('p2-marked')) return;

            if (idx === 12 && !isTimerRunning) {
                startTimer(true);
                cell.classList.add(myRole + '-marked');
                return;
            }

            if (isTimerRunning) {
                cell.classList.add(myRole + '-marked');
                conn.send({ type: 'mark', idx: idx, role: myRole });
                checkLockout();
            }
        }

        function startTimer(send) {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime;
                const m = Math.floor(diff / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                const ms = Math.floor((diff % 1000) / 10);
                document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
            }, 10);
            isTimerRunning = true;
            if (send) conn.send({ type: 'startTimer' });
        }

        function checkLockout() {
            const p1Count = document.querySelectorAll('.p1-marked').length;
            const p2Count = document.querySelectorAll('.p2-marked').length;
            if (p1Count >= 13 || p2Count >= 13) {
                clearInterval(timerInterval);
                document.getElementById('winnerTitle').textContent = (p1Count >= 13 ? "PLAYER 1" : "PLAYER 2") + " WINS!";
                document.getElementById('finalTime').textContent = "Final Time: " + document.getElementById('timerDisplay').textContent;
                document.getElementById('winModal').classList.remove('hidden');
                confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            }
        }

        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        initPeer();
    </script>
</body>
</html>
